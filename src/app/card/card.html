@if(bookData){

<div class="card shadow mx-auto h-100">

    <img
        [src]="bookData.volumeInfo.imageLinks?.thumbnail || 'https://via.placeholder.com/128x190?text=No+Cover'"
        class="card-img-top"
        [alt]="bookData.volumeInfo.title">

    <div class="card-body">

        <h5 class="card-title">
            {{ bookData.volumeInfo.title }}
        </h5>

        <p class="card-text">
            <strong>Author:</strong>
            {{ bookData.volumeInfo.authors?.join(', ') || 'Unknown Author' }}
        </p>

        <p class="card-text">
            <strong>Publisher:</strong>
            {{ bookData.volumeInfo.publisher || 'Unknown' }}
        </p>

        <p class="card-text">
            <strong>Published:</strong>
            {{ bookData.volumeInfo.publishedDate }}
        </p>

        <button
  class="btn btn-primary w-100"
  [routerLink]="['/book-details', bookData.id]">
  View Details
</button>

    </div>

</div>

}
