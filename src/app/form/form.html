<div class="container py-5">

    <div class="contact-card">

        <div class="text-center mb-5">

            <h2 class="contact-title">
                ✨ Contact Neon BookVerse
            </h2>

            <p class="contact-subtitle">
                We'd love to hear from you. Submit your membership request,
                suggest a book, or contact our library team.
            </p>

        </div>

        <form>

            <div class="row">

                <!-- Left Column -->

                <div class="col-lg-6">

                    <div class="mb-4">
                        <label class="form-label">👤 Full Name</label>
                        <input
                            type="text"
                            class="form-control"
                            placeholder="Enter your full name">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">📧 Email Address</label>
                        <input
                            type="email"
                            class="form-control"
                            placeholder="Enter your email">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">📱 Mobile Number</label>
                        <input
                            type="tel"
                            class="form-control"
                            placeholder="Enter your mobile number">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">📖 Book Title</label>
                        <input
                            type="text"
                            class="form-control"
                            placeholder="Book you are searching for">
                    </div>

                </div>

                <!-- Right Column -->

                <div class="col-lg-6">

                    <div class="mb-4">
                        <label class="form-label">✍ Author Name</label>
                        <input
                            type="text"
                            class="form-control"
                            placeholder="Author name">
                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            📚 Book Category
                        </label>

                        <select class="form-select">

                            <option selected disabled>
                                Select Category
                            </option>

                            <option>Fiction</option>
                            <option>Non-Fiction</option>
                            <option>Programming</option>
                            <option>Artificial Intelligence</option>
                            <option>Data Science</option>
                            <option>Business</option>
                            <option>History</option>
                            <option>Self Help</option>

                        </select>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            ⭐ Membership
                        </label>

                        <select class="form-select">

                            <option selected disabled>
                                Select Membership
                            </option>

                            <option>Basic</option>
                            <option>Premium</option>
                            <option>Student</option>

                        </select>

                    </div>

                </div>

            </div>

            <!-- Message -->

            <div class="mb-4">

                <label class="form-label">
                    💬 Message / Book Request
                </label>

                <textarea
                    rows="5"
                    class="form-control"
                    placeholder="Tell us which book you're looking for or leave your message..."></textarea>

            </div>

            <div class="text-center">

                <button class="btn btn-primary px-5 py-3">

                    🚀 Submit Request

                </button>

            </div>

        </form>

    </div>

</div>
